name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'リリースタグ名（例: v0.1.0）'
        required: true

# 2026-06-02 以降、JavaScript Actions の既定が Node.js 24 になる予定。
# 警告抑制のため明示的に Node.js 24 で動かす。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Windows Release
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.5

      - name: PyInstaller build
        run: pyinstaller --noconfirm LivelyRec.spec

      - name: Determine release name
        id: vars
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF_TYPE -eq 'tag') {
            "${{ github.ref_name }}"
          } else {
            "${{ inputs.tag }}"
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "asset=LivelyRec-$tag-windows-x64.zip" >> $env:GITHUB_OUTPUT

      - name: Archive build output
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist/LivelyRec/*" `
            -DestinationPath "${{ steps.vars.outputs.asset }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: LivelyRec ${{ steps.vars.outputs.tag }}
          files: ${{ steps.vars.outputs.asset }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.vars.outputs.tag, '-') }}
