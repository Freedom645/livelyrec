name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 2026-06-02 以降、JavaScript Actions の既定が Node.js 24 になる予定。
# 警告抑制のため明示的に Node.js 24 で動かす。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  light:
    name: Lint + Light Test
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install (without PaddleOCR)
        # 既定で dev グループが入る。ocr extra は付けないため PaddleOCR は除外される。
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check livelyrec tests scripts

      - name: Pytest (excluding requires_paddle)
        run: uv run pytest -q -m "not requires_paddle"

  full:
    name: Full Test (with PaddleOCR)
    runs-on: windows-latest
    timeout-minutes: 30
    # PR では PaddleOCR の重い依存解決をスキップして CI を高速化。
    # main への push と手動実行のみフルテストを行う。
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install (full)
        # ocr extra を付けて PaddleOCR も導入（dev グループは既定で入る）。
        run: uv sync --frozen --extra ocr

      - name: Pytest (all tests including requires_paddle)
        run: uv run pytest -q
