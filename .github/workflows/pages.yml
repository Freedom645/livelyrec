name: Pages

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - '_config.yml'
      - 'data/master.json'
      - 'data/banner_features.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新のみ採用（リリース系の衝突回避）
concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # アプリが起動時に取得する配信データをリポジトリルートへ配置し、
      # Jekyll に静的ファイルとして取り込ませる（jekyll-build-pages は
      # Docker 内 root で _site を作るため、ビルド後の cp は権限エラーに
      # なる。ビルド前にルートへ置くことで _site/master.json 等として出力）。
      - name: Stage distribution data
        shell: bash
        run: |
          cp data/master.json ./master.json
          cp data/banner_features.json ./banner_features.json

      # 旧「Deploy from a branch」と同じ Jekyll パイプラインで README.md を
      # 描画する。これにより元の Pages サイトと同一のテーマ・スタイル・
      # リンクが復元される。出力は ./_site。
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
