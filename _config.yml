# GitHub Pages (Jekyll) 設定
# README.md をトップページとして描画し、配布データ (master.json /
# banner_features.json) のみを公開する。ソースコードや設計ドキュメントは
# 公開対象から除外する。

title: LivelyRec
description: pop'n music lively のスコア記録・配信支援ツール（非公式）
theme: jekyll-theme-cayman

# 以下はサイトに含めない（ソース・テスト・設計書・ビルド成果物など）
exclude:
  - livelyrec/
  - tests/
  - scripts/
  - docs/
  - browser_source/
  - templates/
  - data/
  - dist/
  - build/
  - .venv/
  - .github/
  - LivelyRec.spec
  - pyproject.toml
  - requirements.txt
  - requirements-dev.txt
  - build_log.txt
  - faulthandler.log
  - livelyrec.log
  - stderr.log
  - stdout.log
  - Gemfile
  - Gemfile.lock
