# Ground Truth for OCR PoC
#
# 目視によるベストエフォート読み取り。
# - song_name は black-bg/white-text の上部バーから読み取り（確度高）
# - 数値（score, judges, combo）は装飾フォントのためコメントに「確信度」記載
# - 不明なものは null 値とし、評価対象から除外する
#
# 評価対象:
#   PaddleOCR が返したテキストの中に、ground truth の値が含まれるかを判定する。
#   楽曲名は exact match と 文字列類似度 (rapidfuzz partial_ratio) の両方を見る。
#   数字はそのまま含まれていれば OK。

